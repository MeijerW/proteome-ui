<!DOCTYPE html>
<html>

<head>

<title>ProteomeUI Explorer</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<header class="header">
<h1>ProteomeUI</h1>
<p>Somitogenesis Expression Explorer</p>

</header>


<div class="main-tabs">

<button class="tab-button active" onclick="openMainTab('spatial', this)">
Spatial Viewer
</button>

<button class="tab-button" onclick="openMainTab('temporal', this)">
Spatiotemporal Viewer
</button>

<button class="tab-button" onclick="openMainTab('go', this)">
GO Term Browser
</button>

</div>


<!-- SPATIAL TAB -->

<div id="spatial" class="main-tab-content active">

<div class="sub-tabs">

<button class="subtab-button active" onclick="openSubTab('spatialSingle', this)">
Single Gene
</button>

<button class="subtab-button" onclick="openSubTab('spatialHeatmap', this)">
Heatmap
</button>

</div>


<div id="spatialSingle" class="subtab-content active">

<h3>Single Gene Spatial Expression</h3>

<input id="spatialGene" placeholder="Enter gene (e.g. tbx6)" list="genes">

<button onclick="plotSpatial()">Plot</button>

</div>


<div id="spatialHeatmap" class="subtab-content">

<h3>Spatial Heatmap</h3>

<textarea id="spatialGenes"
placeholder="Enter genes separated by commas"></textarea>

<label for="spatialGeneMembership">Gene set:</label>
<select id="spatialGeneMembership">
<option value="all" selected>Show all genes</option>
<option value="both">Show only genes present in both RNA and Protein</option>
</select>

<label for="spatialAggregation">Display mode:</label>
<select id="spatialAggregation">
<option value="average" selected>Average per region</option>
<option value="samples">Individual samples (if available)</option>
</select>

<button onclick="plotSpatialHeatmap()">Generate Heatmap</button>

</div>

</div>



<!-- TEMPORAL TAB -->

<div id="temporal" class="main-tab-content">

<div class="sub-tabs">

<button class="subtab-button active" onclick="openSubTab('temporalSingle', this)">
Single Gene
</button>

<button class="subtab-button" onclick="openSubTab('temporalHeatmap', this)">
Heatmap
</button>

</div>


<div id="temporalSingle" class="subtab-content active">

<h3>Spatiotemporal Single Gene</h3>

<input id="temporalGene" list="genes-temporal">

<select id="region">

<option>Posterior</option>
<option>Anterior</option>
<option>Somite</option>

</select>

<button onclick="plotTemporal()">Plot</button>

</div>


<div id="temporalHeatmap" class="subtab-content">

<h3>Spatiotemporal Heatmap</h3>

<textarea id="temporalGenes" list="genes-temporal" placeholder="Enter genes separated by commas"></textarea>

<label for="temporalGeneMembership">Gene set:</label>
<select id="temporalGeneMembership">
<option value="all" selected>Show all genes</option>
<option value="both">Show only genes present in both RNA and Protein</option>
</select>

<label for="temporalAggregation">Display mode:</label>
<select id="temporalAggregation">
<option value="average" selected>Average per timepoint</option>
<option value="samples">Individual samples (replicates)</option>
</select>

<div class="meta-controls">
<span>Add metadata columns:</span>
<label><input type="checkbox" class="temporal-metric-checkbox" value="P_VALUE"> P_VALUE</label>
<label><input type="checkbox" class="temporal-metric-checkbox" value="Q_VALUE"> Q_VALUE</label>
<label><input type="checkbox" class="temporal-metric-checkbox" value="PERIOD"> PERIOD</label>
<label><input type="checkbox" class="temporal-metric-checkbox" value="LAG"> LAG</label>
<label><input type="checkbox" class="temporal-metric-checkbox" value="AMPLITUDE"> AMPLITUDE</label>
<label><input type="checkbox" class="temporal-metric-checkbox" value="OFFSET"> OFFSET</label>
<label><input type="checkbox" class="temporal-metric-checkbox" value="MEAN_PERIODICITY"> MEAN_PERIODICITY</label>
<label><input type="checkbox" class="temporal-metric-checkbox" value="SCATTER"> SCATTER</label>
</div>

<select id="heatmapRegion">

<option>Posterior</option>
<option>Anterior</option>
<option>Somite</option>

</select>

<button onclick="plotTemporalHeatmap()">Generate Heatmap</button>

</div>

</div>


<!-- GO TERM TAB -->
<div id="go" class="main-tab-content">

<div class="sub-tabs">

<button class="subtab-button active" onclick="openSubTab('goSpatial', this)">
GO Spatial Heatmap
</button>

<button class="subtab-button" onclick="openSubTab('goTemporal', this)">
GO Spatiotemporal Heatmap
</button>

</div>


<div id="goSpatial" class="subtab-content active">

<h3>GO Term Spatial Heatmap</h3>

<label for="goTermInput">GO term (ID or keyword):</label>
<input id="goTermInput" placeholder="e.g. GO:0007049 or cell cycle" list="goTerms">
<button onclick="searchGoTerm()">Search GO term</button>
<div id="goSearchStatus" style="margin-top: 10px; font-size: 0.9rem; color: #555;"></div>

<label for="goSpatialGeneMembership">Gene set:</label>
<select id="goSpatialGeneMembership">
<option value="all" selected>Show all genes</option>
<option value="both">Show only genes present in both RNA and Protein</option>
</select>

<label for="goSpatialAggregation">Display mode:</label>
<select id="goSpatialAggregation">
<option value="average" selected>Average per region</option>
<option value="samples">Individual samples (if available)</option>
</select>

<button onclick="plotGoSpatialHeatmap()">Generate GO heatmap (Spatial)</button>
<p id="goGeneCount" style="margin-top: 0.75rem; font-size: 0.9rem; color: #333;"></p>

</div>


<div id="goTemporal" class="subtab-content">

<h3>GO Term Spatiotemporal Heatmap</h3>

<label for="goTermInputTemporal">GO term (ID or keyword):</label>
<input id="goTermInputTemporal" placeholder="e.g. GO:0007049 or cell cycle" list="goTerms">
<button onclick="searchGoTerm(true)">Search GO term</button>
<div id="goSearchStatusTemporal" style="margin-top: 10px; font-size: 0.9rem; color: #555;"></div>

<label for="goTemporalGeneMembership">Gene set:</label>
<select id="goTemporalGeneMembership">
<option value="all" selected>Show all genes</option>
<option value="both">Show only genes present in both RNA and Protein</option>
</select>

<label for="goTemporalAggregation">Display mode:</label>
<select id="goTemporalAggregation">
<option value="average" selected>Average per timepoint</option>
<option value="samples">Individual samples (replicates)</option>
</select>

<div class="meta-controls">
<span>Add metadata columns:</span>
<label><input type="checkbox" class="go-temporal-metric-checkbox" value="P_VALUE"> P_VALUE</label>
<label><input type="checkbox" class="go-temporal-metric-checkbox" value="Q_VALUE"> Q_VALUE</label>
<label><input type="checkbox" class="go-temporal-metric-checkbox" value="PERIOD"> PERIOD</label>
<label><input type="checkbox" class="go-temporal-metric-checkbox" value="LAG"> LAG</label>
<label><input type="checkbox" class="go-temporal-metric-checkbox" value="AMPLITUDE"> AMPLITUDE</label>
<label><input type="checkbox" class="go-temporal-metric-checkbox" value="OFFSET"> OFFSET</label>
<label><input type="checkbox" class="go-temporal-metric-checkbox" value="MEAN_PERIODICITY"> MEAN_PERIODICITY</label>
<label><input type="checkbox" class="go-temporal-metric-checkbox" value="SCATTER"> SCATTER</label>
</div>

<select id="goHeatmapRegion">
<option>Posterior</option>
<option>Anterior</option>
<option>Somite</option>
</select>

<button onclick="plotGoTemporalHeatmap()">Generate GO heatmap (Spatiotemporal)</button>
<p id="goGeneCountTemporal" style="margin-top: 0.75rem; font-size: 0.9rem; color: #333;"></p>

</div>

</div>


<div id="plotLayout">
<div id="plot"></div>
<div id="temporalStatsPanel" class="stats-panel"></div>
</div>


<datalist id="genes"></datalist>
<datalist id="genes-temporal"></datalist>
<datalist id="goTerms"></datalist>


<script src="js/data.js"></script>
<script src="js/plots.js"></script>
<script src="js/heatmap.js"></script>
<script src="js/app.js"></script>
<script src="js/autocomplete.js"></script>

</body>

</html>
