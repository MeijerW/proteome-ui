<!DOCTYPE html>
<html>

<head>

<title>ProteomeUI Explorer</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>

</head>

<body>

<header class="header">
<h1>ProteomeUI</h1>
<p>Somitogenesis Expression Explorer</p>
</header>


<div class="container">

<div class="sidebar">

<h3>Spatial Viewer</h3>

<button onclick="showPanel('spatialSingle')">
Single Gene Plot
</button>

<button onclick="showPanel('spatialHeatmap')">
Multi-Gene Heatmap
</button>


<h3>Spatiotemporal Viewer</h3>

<button onclick="showPanel('temporalSingle')">
Single Gene Plot
</button>

<button onclick="showPanel('temporalHeatmap')">
Multi-Gene Heatmap
</button>

</div>


<div class="content">

<div id="spatialSingle" class="panel">

<h2>Spatial Expression</h2>

<input id="geneInput" placeholder="Enter gene (e.g. tbx6)">

<button onclick="runSpatial()">Plot</button>

</div>


<div id="plot"></div>

</div>

</div>


<script src="js/data.js"></script>
<script src="js/plots.js"></script>
<script src="js/app.js"></script>

</body>

</html>
