<!DOCTYPE html>
<html>

<head>

<title>ProteomeUI Explorer</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
<script src="https://cdn.jsdelivr.net/npm/ml-hclust"></script>

</head>

<body>

<div class="toolbar">

<input id="geneInput" placeholder="Enter gene">

<select id="viewer">

<option value="spatial">Spatial Viewer</option>
<option value="spatialHeatmap">Spatial Heatmap</option>
<option value="temporal">Spatiotemporal Viewer</option>
<option value="temporalHeatmap">Spatiotemporal Heatmap</option>

</select>

<button onclick="runViewer()">
Plot
</button>

<button onclick="downloadFigure()">
Download
</button>

</div>


<div class="plot-area">

<div id="plot"></div>

</div>

<script src="js/data.js"></script>
<script src="js/plots.js"></script>
<script src="js/heatmap.js"></script>
<script src="js/autocomplete.js"></script>
<script src="js/app.js"></script>

</body>

</html>
