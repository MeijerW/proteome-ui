<body>

<div class="topbar">

<h2>ProteomeUI Explorer</h2>

</div>


<div class="tabs">

<button onclick="showMainTab('spatial')">
Spatial Viewer
</button>

<button onclick="showMainTab('temporal')">
Spatiotemporal Viewer
</button>

</div>


<!-- SPATIAL -->

<div id="spatial" class="mainTab">

<div class="subtabs">

<button onclick="showSubTab('spatialSingle')">
Single Gene
</button>

<button onclick="showSubTab('spatialHeatmap')">
Heatmap
</button>

</div>


<div id="spatialSingle" class="subTab">

<h3>Single Gene Spatial Expression</h3>

<input id="spatialGene" placeholder="Enter gene (e.g. tbx6)">

<button onclick="plotSpatialSingle()">
Plot
</button>

</div>


<div id="spatialHeatmap" class="subTab">

<h3>Spatial Heatmap</h3>

<textarea id="spatialGenes" placeholder="Enter genes separated by commas"></textarea>

<button onclick="plotSpatialHeatmap()">
Generate Heatmap
</button>

</div>

</div>


<!-- SPATIOTEMPORAL -->

<div id="temporal" class="mainTab">

<div class="subtabs">

<button onclick="showSubTab('temporalSingle')">
Single Gene
</button>

<button onclick="showSubTab('temporalHeatmap')">
Heatmap
</button>

</div>


<div id="temporalSingle" class="subTab">

<h3>Single Gene Spatiotemporal Expression</h3>

<input id="temporalGene">

<select id="region">

<option>Posterior</option>
<option>Anterior</option>
<option>Somite</option>

</select>

<button onclick="plotTemporalSingle()">
Plot
</button>

</div>


<div id="temporalHeatmap" class="subTab">

<h3>Spatiotemporal Heatmap</h3>

<textarea id="temporalGenes"></textarea>

<select id="heatmapRegion">

<option>Posterior</option>
<option>Anterior</option>
<option>Somite</option>

</select>

<button onclick="plotTemporalHeatmap()">
Generate Heatmap
</button>

</div>

</div>


<div id="plot"></div>

</body>
